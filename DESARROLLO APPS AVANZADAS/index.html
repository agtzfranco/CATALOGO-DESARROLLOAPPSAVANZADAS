<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUZZI - Catálogo</title>
  <link rel="stylesheet" href="estilos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <div class="logo">Guzzi</div>
      <nav class="nav">
        <a href="#">Inicio</a>
        <a href="#" class="active">Tienda</a>
        <a href="#">Colecciones</a>
        <a href="#">Contacto</a>
      </nav>
      <div class="header-actions">
        <button class="cart-btn" id="cartBtn">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <div class="currency-selector">
          <span class="flag">🇲🇽</span>
          <select id="currency">
            <option value="MXN">MXN</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- Breadcrumbs -->
  <div class="breadcrumbs">
    <a href="#">Inicio</a> / <span>Tienda</span>
  </div>

  <!-- Filtros -->
  <section class="filters">
    <div class="filter-group">
      <label for="sort">Ordenar por:</label>
      <select id="sort">
        <option value="default">Relevancia</option>
        <option value="price-asc">Precio: Menor a Mayor</option>
        <option value="price-desc">Precio: Mayor a Menor</option>
        <option value="name-asc">Nombre: A-Z</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="category">Categoría:</label>
      <select id="category">
        <option value="all">Todas</option>
        <option value="playeras">Playeras</option>
        <option value="accesorios">Pantalones</option>
        <option value="vestidos">Accesorios</option>
      </select>
    </div>
  </section>

  <!-- Catálogo de Productos -->
  <main class="catalog">
    <div class="products-grid" id="productsGrid">
      <!-- Los productos se generan con JavaScript -->
    </div>
  </main>

  <!-- Modal Quick View -->
  <div class="modal" id="quickViewModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody">
        <!-- Contenido dinámico -->
      </div>
    </div>
  </div>

  <!-- Notificación -->
  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Producto añadido al carrito</span>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Guzzi. Todos los derechos reservados. Hecho en México 🇲🇽</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
